<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a2129">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>F.W. DRUCIK - Panel Zarządzania</title>
    <style>
        /* Zmienne CSS - motyw warsztatowy */
        :root { 
            --primary: #1a2129; --accent: #00bcff; --danger: #e74c3c; 
            --bg: #f4f6f9; --text: #2c3e50; --border: #dcdde1; 
            --warning: #f39c12; --ksef: #2980b9; --card-bg: #ffffff;
        }
        
        [data-theme="dark"] {
            --primary: #10141a; --accent: #00bcff; --danger: #ef4444; 
            --bg: #0b0d11; --text: #eceff1; --border: #222a35; 
            --warning: #f39c12; --ksef: #3498db; --card-bg: #151b22;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; max-width: 600px; margin: 0 auto; transition: background-color 0.3s, color 0.3s; }
        
        .nav { display: flex; justify-content: space-between; background: var(--primary); padding: 6px; border-radius: 10px; margin-bottom: 20px; overflow-x: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: 1px solid var(--border); }
        .nav button { background: none; color: #a0aec0; border: none; padding: 10px 12px; cursor: pointer; font-size: 0.85em; border-radius: 6px; white-space: nowrap; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-weight: 600;}
        .nav button.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(0, 188, 255, 0.4); }
        .nav svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
        
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card-bg); padding: 20px; border-radius: 14px; box-shadow: 0 6px 12px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid var(--border); transition: background-color 0.3s, border-color 0.3s;}
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-size: 1.35em; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700;}
        [data-theme="dark"] h2 { color: #fff; }
        
        .brand-container { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 15px 0 25px 0; text-align: center; }
        .logo-text-main { font-size: 2.4em; font-weight: 900; letter-spacing: 2px; color: var(--primary); margin: 0; font-style: italic; }
        [data-theme="dark"] .logo-text-main { color: #fff; text-shadow: 0 0 10px rgba(0, 188, 255, 0.3); }
        .logo-text-sub { font-size: 0.85em; font-weight: 700; text-transform: uppercase; letter-spacing: 5px; color: var(--warning); margin-top: 4px; }

        .timer { font-size: 3.5em; text-align: center; font-weight: bold; margin: 15px 0; font-variant-numeric: tabular-nums; color: var(--accent); text-shadow: 0 0 15px rgba(0, 188, 255, 0.15); }
        
        .btn-main { width: 100%; padding: 15px; font-size: 1.05em; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        #startBtn { background-color: var(--accent); box-shadow: 0 4px 12px rgba(0, 188, 255, 0.3); }
        #stopBtn { background-color: var(--danger); box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3); }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { background: var(--primary); color: white; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600;}
        .btn-action svg { width: 18px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
        .btn-action:hover { opacity: 0.9; }
